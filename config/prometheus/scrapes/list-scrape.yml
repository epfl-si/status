scrape_configs:
  - job_name: blackbox
    metrics_path: /probe
    params:
      module:
        - http_2xx
        - icmp
    static_configs:
      - targets:
          - https://go.epfl.ch
          - https://ticketshop.epfl.ch
          - https://status-testserver.fsd.epfl.ch
          - https://eeee.epfl.ch
          - https://status-test.epfl.ch
          - https://status.epfl.ch
          - https://www.epfl.ch
          - https://actu.epfl.ch
          - https://unexist.epfl.ch
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: status_blackbox_exporter:9115
